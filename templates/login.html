<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>TreeAge AI — Connexion</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Segoe UI',sans-serif;background:linear-gradient(135deg,#0d1f14,#1a3325);
         min-height:100vh;display:flex;align-items:center;justify-content:center}
    .card{background:#fff;border-radius:16px;padding:40px 36px;width:360px;
          box-shadow:0 20px 60px rgba(0,0,0,.4)}
    .logo{text-align:center;margin-bottom:28px}
    .logo h1{font-size:28px;color:#0d1f14;font-weight:700}
    .logo p{font-size:12px;color:#64748b;margin-top:4px}
    label{display:block;font-size:12px;font-weight:600;color:#374151;margin-bottom:5px}
    input{width:100%;padding:11px 14px;border:1px solid #d1d5db;border-radius:8px;
          font-size:14px;outline:none;transition:.2s;margin-bottom:16px}
    input:focus{border-color:#4ade80;box-shadow:0 0 0 3px rgba(74,222,128,.15)}
    .gps-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
    .gps-row .gps-hint{font-size:11px;color:#94a3b8;margin-top:-12px;margin-bottom:14px;grid-column:span 2}
    button{width:100%;padding:13px;background:#2d5a3d;color:#fff;border:none;
           border-radius:8px;font-size:15px;font-weight:600;cursor:pointer;transition:.2s}
    button:hover{background:#1a3325}
    .error{background:#fee2e2;color:#dc2626;padding:10px 14px;border-radius:8px;
           font-size:13px;margin-bottom:16px;border-left:4px solid #dc2626}
    .footer{text-align:center;font-size:11px;color:#94a3b8;margin-top:20px}
    .divider{border:none;border-top:1px solid #e5e7eb;margin:20px 0}
  </style>
</head>
<body>
<div class="card">
  <div class="logo">
    <h1>🌳 TreeAge AI</h1>
    <p>Estimation Non-Destructive — Algérie v3.1</p>
  </div>
  {% if error %}
  <div class="error">{{ error }}</div>
  {% endif %}
  <form method="POST" action="/login">
    <label>Email</label>
    <input type="email" name="email" placeholder="admin@treepage.fr" required>
    <label>Mot de passe</label>
    <input type="password" name="password" placeholder="••••••••" required>
    <button type="submit">🔐 Se connecter</button>
  </form>
  <div class="footer">
    Master's Thesis — Estimation d'âge des arbres<br>
    Algérie · 8 espèces · Pipeline IA v3.1
  </div>
</div>
</body>
</html>
